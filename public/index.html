<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breach X - Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;color:#e0e0e0;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(124,58,237,0.08) 0%,transparent 50%),radial-gradient(circle at 70% 80%,rgba(168,85,247,0.05) 0%,transparent 50%);z-index:-1;animation:bgPulse 15s ease-in-out infinite alternate}
@keyframes bgPulse{0%{transform:translate(0,0)}100%{transform:translate(-3%,-2%)}}

.glass{background:rgba(17,17,30,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(124,58,237,0.15);border-radius:20px}

.header{padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;border-bottom:1px solid rgba(124,58,237,0.1);background:rgba(5,5,16,0.8);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:16px}
.logo{width:42px;height:42px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.4)}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-right{display:flex;align-items:center;gap:16px}
.user-chip{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.2);border-radius:12px;font-size:13px;color:#a78bfa}
.user-chip svg{width:16px;height:16px;fill:#a78bfa}
.logout-btn{padding:8px 18px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#f87171;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s}
.logout-btn:hover{background:rgba(239,68,68,0.25);border-color:#ef4444}

.stats-bar{display:flex;gap:12px;padding:24px 32px;flex-wrap:wrap}
.stat-card{flex:1;min-width:140px;padding:20px;border-radius:16px;text-align:center;transition:transform 0.2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card.total{background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.2)}
.stat-card.used{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2)}
.stat-card.free{background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2)}
.stat-card .num{font-size:32px;font-weight:800;margin-bottom:4px}
.stat-card.total .num{color:#a78bfa}
.stat-card.used .num{color:#4ade80}
.stat-card.free .num{color:#818cf8}
.stat-card .label{font-size:12px;text-transform:uppercase;letter-spacing:1px;opacity:0.6}

.main{max-width:1200px;margin:0 auto;padding:0 32px 40px}
.section{padding:28px;margin-bottom:24px}
.section-title{font-size:16px;font-weight:600;color:#c4b5fd;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:20px;background:linear-gradient(180deg,#7c3aed,#a855f7);border-radius:4px}

.gen-row{display:flex;gap:10px;margin-bottom:16px}
.gen-row input{flex:1;padding:14px 18px;background:rgba(30,27,75,0.5);border:1px solid rgba(124,58,237,0.2);border-radius:12px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;transition:border-color 0.2s;outline:none}
.gen-row input:focus{border-color:#7c3aed;box-shadow:0 0 0 3px rgba(124,58,237,0.15)}
.gen-row input::placeholder{color:rgba(255,255,255,0.3)}
.btn{padding:14px 24px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,0.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,58,237,0.4)}
.btn-danger{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.btn-danger:hover{background:rgba(239,68,68,0.25)}

.new-keys-box{display:none;padding:18px;border-radius:12px;margin-top:16px;max-height:280px;overflow-y:auto;font-family:'Courier New',monospace;font-size:13px;color:#4ade80;direction:ltr;text-align:left;white-space:pre-line;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);line-height:1.8}
.new-keys-box::-webkit-scrollbar{width:6px}
.new-keys-box::-webkit-scrollbar-track{background:transparent}
.new-keys-box::-webkit-scrollbar-thumb{background:rgba(34,197,94,0.3);border-radius:3px}

.filter-row{display:flex;gap:6px;margin-bottom:16px}
.filter-btn{padding:8px 18px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.5);border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.2s;font-family:'Inter',sans-serif}
.filter-btn.active{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.4);color:#a78bfa}
.filter-btn:hover:not(.active){background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7)}

.keys-list{max-height:450px;overflow-y:auto}
.keys-list::-webkit-scrollbar{width:6px}
.keys-list::-webkit-scrollbar-track{background:transparent}
.keys-list::-webkit-scrollbar-thumb{background:rgba(124,58,237,0.3);border-radius:3px}

.key-item{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.05);gap:12px;flex-wrap:wrap;transition:background 0.15s}
.key-item:last-child{border-bottom:none}
.key-item:hover{background:rgba(124,58,237,0.05)}
.key-item .code{color:#4ade80;font-family:'Courier New',monospace;font-size:14px;font-weight:600;direction:ltr;text-align:left;min-width:220px;flex:1}
.key-item .hwid{color:rgba(250,204,21,0.8);font-size:12px;min-width:150px;flex:1;font-family:'Courier New',monospace;direction:ltr}
.key-badge{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px}
.key-badge.used{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2)}
.key-badge.free{background:rgba(99,102,241,0.15);color:#818cf8;border:1px solid rgba(99,102,241,0.2)}
.key-actions{display:flex;gap:6px}
.key-actions button{padding:5px 12px;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:all 0.15s;font-family:'Inter',sans-serif}
.key-actions .revoke{background:rgba(250,204,21,0.12);color:#facc15;border:1px solid rgba(250,204,21,0.2)}
.key-actions .revoke:hover{background:rgba(250,204,21,0.2)}
.key-actions .delete{background:rgba(239,68,68,0.12);color:#f87171;border:1px solid rgba(239,68,68,0.2)}
.key-actions .delete:hover{background:rgba(239,68,68,0.2)}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:14px;font-size:14px;font-weight:500;z-index:999;animation:toastIn 0.4s cubic-bezier(0.16,1,0.3,1);backdrop-filter:blur(12px)}
.toast.ok{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3);box-shadow:0 8px 30px rgba(34,197,94,0.15)}
.toast.err{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3);box-shadow:0 8px 30px rgba(239,68,68,0.15)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px) scale(0.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
.hidden{display:none}

.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{max-width:440px;width:100%;padding:48px 40px;text-align:center}
.login-logo{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-weight:800;font-size:32px;color:#fff;box-shadow:0 8px 40px rgba(124,58,237,0.4)}
.login-box h2{font-size:28px;font-weight:700;background:linear-gradient(135deg,#a855f7,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.login-box p{color:rgba(255,255,255,0.4);font-size:14px;margin-bottom:32px}
.google-signin-container{display:flex;justify-content:center}
.google-signin-container iframe{border-radius:12px !important}
.login-footer{margin-top:40px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);font-size:12px}

@media(max-width:768px){
  .header{padding:16px 20px}
  .stats-bar{padding:16px 20px}
  .main{padding:0 20px 30px}
  .stat-card .num{font-size:24px}
  .key-item{flex-direction:column;align-items:flex-start}
  .key-item .code,.key-item .hwid{min-width:auto}
}
</style>
</head>
<body>

<div class="login-page" id="loginBox">
  <div class="login-box glass">
    <div class="login-logo">BX</div>
    <h2>Breach X</h2>
    <p>Key Management System</p>
    <div class="google-signin-container" id="googleSignIn"></div>
    <div class="login-footer">Secure Admin Panel</div>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="header">
    <div class="header-left">
      <div class="logo">BX</div>
      <h1>Breach X - Key Manager</h1>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        <span id="userEmail"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card total glass">
      <div class="num" id="statTotal">0</div>
      <div class="label">Total Keys</div>
    </div>
    <div class="stat-card used glass">
      <div class="num" id="statUsed">0</div>
      <div class="label">Used</div>
    </div>
    <div class="stat-card free glass">
      <div class="num" id="statFree">0</div>
      <div class="label">Available</div>
    </div>
  </div>

  <div class="main">
    <div class="section glass">
      <div class="section-title">Generate New Keys</div>
      <div class="gen-row">
        <input type="number" id="keyCount" placeholder="How many keys?" value="10" min="1" max="500">
        <button class="btn btn-primary" onclick="generateKeys()">Generate</button>
        <button class="btn btn-danger" onclick="deleteAllUnused()">Delete All Unused</button>
      </div>
      <div class="new-keys-box" id="newKeysBox"></div>
    </div>
    <div class="section glass">
      <div class="section-title">All Keys</div>
      <div class="filter-row">
        <button class="filter-btn active" onclick="filterKeys('all',this)">All</button>
        <button class="filter-btn" onclick="filterKeys('used',this)">Used</button>
        <button class="filter-btn" onclick="filterKeys('free',this)">Available</button>
      </div>
      <div class="keys-list" id="keysList"></div>
    </div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
let SESSION_TOKEN = localStorage.getItem('bx_session') || '';
let allKeys = [];
let currentFilter = 'all';

function toast(msg, ok) {
  const t = document.createElement('div');
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function api(path, body = {}) {
  const headers = { 'Content-Type': 'application/json' };
  if (SESSION_TOKEN) headers['x-session-token'] = SESSION_TOKEN;
  const r = await fetch(path, {
    method: body._get ? 'GET' : 'POST',
    headers,
    body: body._get ? undefined : JSON.stringify(body)
  });
  return r.json();
}

async function handleCredentialResponse(response) {
    const r = await api('/api/auth/google', { credential: response.credential });
    if (!r.success) { toast(r.message, false); return; }
    SESSION_TOKEN = r.token;
    localStorage.setItem('bx_session', r.token);
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('userEmail').textContent = r.email;
    loadKeys();
}

window.onload = function() {
    google.accounts.id.initialize({
        client_id: '553558187438-il1bdg8rru2o1sedpur96ng0lv5takqb.apps.googleusercontent.com',
        callback: handleCredentialResponse
    });
    google.accounts.id.renderButton(
        document.getElementById('googleSignIn'),
        { theme: 'filled_blue', size: 'large', width: 280, shape: 'pill', text: 'signin_with' }
    );
    if (SESSION_TOKEN) checkSession();
};

async function checkSession() {
    const r = await api('/api/auth/check', { token: SESSION_TOKEN });
    if (r.success) {
        document.getElementById('loginBox').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('userEmail').textContent = r.email;
        loadKeys();
    } else {
        SESSION_TOKEN = '';
        localStorage.removeItem('bx_session');
    }
}

async function doLogout() {
    await api('/api/auth/logout', { token: SESSION_TOKEN });
    SESSION_TOKEN = '';
    localStorage.removeItem('bx_session');
    document.getElementById('dashboard').classList.add('hidden');
    document.getElementById('loginBox').classList.remove('hidden');
}

async function loadKeys() {
  const r = await api('/api/keys', { _get: true });
  if (!r.success) { toast(r.message, false); return; }
  allKeys = r.keys;
  updateStats();
  renderKeys();
}

async function updateStats() {
  const r = await api('/api/stats', { _get: true });
  if (r.success) {
    document.getElementById('statTotal').textContent = r.total;
    document.getElementById('statUsed').textContent = r.used;
    document.getElementById('statFree').textContent = r.unused;
  }
}

function renderKeys() {
  const list = document.getElementById('keysList');
  let filtered = allKeys;
  if (currentFilter === 'used') filtered = allKeys.filter(k => k.is_used);
  if (currentFilter === 'free') filtered = allKeys.filter(k => !k.is_used);
  if (!filtered.length) { list.innerHTML = '<div style="padding:40px;text-align:center;color:rgba(255,255,255,0.2);font-size:14px">No keys found</div>'; return; }
  list.innerHTML = filtered.map(k => `
    <div class="key-item">
      <span class="code">${k.key_code}</span>
      <span class="hwid">${k.is_used ? k.hwid : '—'}</span>
      <span class="key-badge ${k.is_used ? 'used' : 'free'}">${k.is_used ? 'USED' : 'AVAILABLE'}</span>
      <div class="key-actions">
        ${k.is_used ? `<button class="revoke" onclick="revokeKey('${k.key_code}')">Revoke</button>` : ''}
        <button class="delete" onclick="deleteKey('${k.key_code}')">Delete</button>
      </div>
    </div>
  `).join('');
}

function filterKeys(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderKeys();
}

async function generateKeys() {
  const count = document.getElementById('keyCount').value;
  const r = await api('/api/generate', { count: parseInt(count) });
  if (!r.success) { toast(r.message, false); return; }
  const box = document.getElementById('newKeysBox');
  box.style.display = 'block';
  box.textContent = r.keys.join('\n');
  toast('Generated ' + r.keys.length + ' keys!', true);
  loadKeys();
}

async function revokeKey(code) {
  const r = await api('/api/revoke', { key_code: code });
  toast(r.message, r.success);
  loadKeys();
}

async function deleteKey(code) {
  const r = await api('/api/delete', { key_code: code });
  toast(r.message, r.success);
  loadKeys();
}

async function deleteAllUnused() {
  if (!confirm('Delete ALL unused keys?')) return;
  const r = await api('/api/delete-all-unused', {});
  toast(r.message, r.success);
  loadKeys();
}
</script>
</body>
</html>
